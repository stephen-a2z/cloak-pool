version: "3.8"

# ┌─────────────────────────────────────────────────────────────┐
# │  Browserless 节点部署                                         │
# │                                                             │
# │  部署步骤:                                                    │
# │  1. 编辑下方环境变量 (MASTER_IP, HOST_IP, NODE_ID, TOKEN)     │
# │  2. docker compose -f docker-compose.browserless.yml up -d  │
# │                                                             │
# │  节点会自动向 Master 心跳注册为 engine=browserless             │
# │  无需 NFS/数据同步（无状态）                                   │
# └─────────────────────────────────────────────────────────────┘

services:
  browserless:
    image: ghcr.io/browserless/chromium
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - CONCURRENT=${MAX_SESSIONS:-5}
      - TOKEN=${BL_TOKEN:-browserless-token}
      - TIMEOUT=60000
      - QUEUED=10
      - HEALTH=true

  heartbeat:
    build: .
    restart: unless-stopped
    environment:
      - ROLE=worker
      - MASTER_URL=http://${MASTER_IP}:9000
      - NODE_ID=${NODE_ID:-bl-node-1}
      - NODE_ADVERTISE_URL=http://${HOST_IP}:3000
      - NODE_ENGINE=browserless
      - NODE_TOKEN=${BL_TOKEN:-browserless-token}
      - MAX_NODE_SESSIONS=${MAX_SESSIONS:-5}
      - WORKER_PORT=9001
    depends_on:
      - browserless
