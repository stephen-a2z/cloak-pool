version: "3.8"

services:
  master:
    build: .
    ports:
      - "9000:9000"
    environment:
      - ROLE=master
      - MASTER_URL=http://master:9000
      - MAX_GLOBAL_SESSIONS=10
      - PROFILE_STORAGE_DIR=/data/profiles
      - DB_PATH=/data/browser-pool.db
    volumes:
      - pool-data:/data

  node-1:
    image: cloakhq/cloakbrowser-manager
    ports:
      - "8080:8080"
    volumes:
      - node1-profiles:/data

  worker-1:
    build: .
    ports:
      - "9001:9001"
    environment:
      - ROLE=worker
      - MASTER_URL=http://master:9000
      - NODE_ID=node-1
      - NODE_ADVERTISE_URL=http://node-1:8080
      - MAX_NODE_SESSIONS=5
      - WORKER_PORT=9001
    depends_on:
      - master
      - node-1

  node-2:
    image: cloakhq/cloakbrowser-manager
    ports:
      - "8082:8080"
    volumes:
      - node2-profiles:/data

  worker-2:
    build: .
    ports:
      - "9002:9001"
    environment:
      - ROLE=worker
      - MASTER_URL=http://master:9000
      - NODE_ID=node-2
      - NODE_ADVERTISE_URL=http://node-2:8080
      - MAX_NODE_SESSIONS=5
      - WORKER_PORT=9001
    depends_on:
      - master
      - node-2

volumes:
  pool-data:
  node1-profiles:
  node2-profiles:
