version: "3.8"

# ┌─────────────────────────────────────────────────────┐
# │  部署步骤:                                            │
# │  1. cp .env.example .env && 编辑 HOST_IP             │
# │  2. docker compose -f docker-compose.master.yml up -d --build │
# │                                                     │
# │  访问: http://<HOST_IP>:9000                         │
# │  Worker 连接 NFS: <HOST_IP>:2049                     │
# └─────────────────────────────────────────────────────┘

services:
  nfs:
    image: itsthenetwork/nfs-server-alpine:12
    restart: unless-stopped
    privileged: true
    ports:
      - "2049:2049"
    environment:
      - SHARED_DIRECTORY=/nfs
    volumes:
      - nfs-data:/nfs

  master:
    build: .
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - ROLE=master
      - MASTER_URL=http://${HOST_IP}:9000
      - MAX_GLOBAL_SESSIONS=10
      - NFS_PROFILES_DIR=/nfs/profiles
      - DB_PATH=/data/browser-pool.db
      - TTL_DEFAULT=1800
      - TTL_MAX=7200
    volumes:
      - pool-data:/data
      - nfs-data:/nfs/profiles

  cloakbrowser:
    image: cloakhq/cloakbrowser-manager
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - cbm-data:/data
      - shared-profiles:/data/profiles

  worker:
    build: .
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      - ROLE=worker
      - MASTER_URL=http://${HOST_IP}:9000
      - NODE_ID=master-node
      - NODE_ADVERTISE_URL=http://${HOST_IP}:8080
      - MAX_NODE_SESSIONS=5
      - WORKER_PORT=9001
      - NFS_PROFILES_DIR=/nfs/profiles
      - LOCAL_PROFILES_DIR=/shared-profiles
    volumes:
      - nfs-data:/nfs/profiles
      - shared-profiles:/shared-profiles
    depends_on:
      - master
      - cloakbrowser

volumes:
  pool-data:
  nfs-data:
  cbm-data:
  shared-profiles:
