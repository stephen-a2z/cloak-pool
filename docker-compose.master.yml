version: "3.8"

# ┌─────────────────────────────────────────────────────┐
# │  部署前先创建 .env 文件:                               │
# │  cp .env.example .env && 编辑 HOST_IP 为本机内网 IP    │
# │                                                     │
# │  启动后访问:                                          │
# │  Dashboard:  http://<HOST_IP>:9000                   │
# │  API:        http://<HOST_IP>:9000/api/health        │
# └─────────────────────────────────────────────────────┘

services:
  master:
    build: .
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - ROLE=master
      - MASTER_URL=http://${HOST_IP}:9000
      - MAX_GLOBAL_SESSIONS=10
      - PROFILE_STORAGE_DIR=/data/profiles
      - DB_PATH=/data/browser-pool.db
      - TTL_DEFAULT=1800
      - TTL_MAX=7200
    volumes:
      - ./data:/data

  cloakbrowser:
    image: cloakhq/cloakbrowser-manager
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - cbm-data:/data

  worker:
    build: .
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      - ROLE=worker
      - MASTER_URL=http://${HOST_IP}:9000
      - NODE_ID=master-node
      - NODE_ADVERTISE_URL=http://${HOST_IP}:8080
      - MAX_NODE_SESSIONS=5
      - WORKER_PORT=9001
    depends_on:
      - master
      - cloakbrowser

volumes:
  cbm-data:
