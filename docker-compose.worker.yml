version: "3.8"

# ┌─────────────────────────────────────────────────────┐
# │  部署前先创建 .env 文件:                               │
# │  cp .env.example .env                               │
# │  编辑 HOST_IP 为本机内网 IP                            │
# │  编辑 MASTER_IP 为 master 节点内网 IP                  │
# │  编辑 NODE_ID 为本节点名称 (如 node-1)                 │
# └─────────────────────────────────────────────────────┘

services:
  cloakbrowser:
    image: cloakhq/cloakbrowser-manager
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./cbm-data:/data

  worker:
    build: .
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      - ROLE=worker
      - MASTER_URL=http://${MASTER_IP}:9000
      - NODE_ID=${NODE_ID:-node-1}
      - NODE_ADVERTISE_URL=http://${HOST_IP}:8080
      - MAX_NODE_SESSIONS=5
      - WORKER_PORT=9001
      - NFS_PROFILES_DIR=/nfs/profiles
    volumes:
      - nfs-profiles:/nfs/profiles
    depends_on:
      - cloakbrowser

volumes:
  nfs-profiles:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${MASTER_IP},nfsvers=4,rw
      device: ":/data/profiles"
