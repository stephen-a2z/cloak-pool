version: "3.8"

# ┌─────────────────────────────────────────────────────┐
# │  部署步骤:                                            │
# │  1. cp .env.example .env                            │
# │  2. 编辑: HOST_IP, MASTER_IP, NODE_ID               │
# │  3. docker compose -f docker-compose.worker.yml up -d --build │
# │                                                     │
# │  NFS 自动挂载 master 的 profiles 目录                  │
# └─────────────────────────────────────────────────────┘

services:
  cloakbrowser:
    image: cloakhq/cloakbrowser-manager
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./cbm-data:/data

  worker:
    build: .
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      - ROLE=worker
      - MASTER_URL=http://${MASTER_IP}:9000
      - NODE_ID=${NODE_ID:-node-1}
      - NODE_ADVERTISE_URL=http://${HOST_IP}:8080
      - MAX_NODE_SESSIONS=5
      - WORKER_PORT=9001
      - NFS_PROFILES_DIR=/nfs/profiles
    volumes:
      - nfs-profiles:/nfs/profiles
    depends_on:
      - cloakbrowser

volumes:
  nfs-profiles:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${MASTER_IP},nfsvers=4,rw,nolock,soft,timeo=30
      device: ":/"
